name: Jump Shop Monitor

on:
  schedule:
    # 每5分钟运行 (北京时间/东京时间)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Restore DB from cache
        uses: actions/cache/restore@v4
        id: cache-db
        with:
          path: data/products.db
          key: jumpshop-db-v2-${{ github.run_id }}
          restore-keys: |
            jumpshop-db-v2-

      - name: Repair DB (clean stale WAL)
        run: |
          mkdir -p data
          rm -f data/products.db-wal data/products.db-shm
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/products.db')
          conn.execute('PRAGMA integrity_check')
          conn.close()
          "

      - name: Setup config
        run: cp config.example.json config.json

      - name: Run monitor
        id: monitor
        continue-on-error: true
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: python monitor_loop.py --once

      - name: Self-heal on failure
        if: steps.monitor.outcome == 'failure'
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          echo "Monitor failed, attempting self-heal..."
          # 删除损坏的数据库
          rm -f data/products.db data/products.db-wal data/products.db-shm
          # 重建空数据库
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/products.db')
          conn.execute('PRAGMA journal_mode=WAL')
          conn.execute('CREATE TABLE IF NOT EXISTS products (id INTEGER PRIMARY KEY, title TEXT, handle TEXT, vendor TEXT, tags TEXT, price INTEGER, available INTEGER, sku TEXT, image_url TEXT, url TEXT, published_at TEXT, updated_at TEXT, first_seen TEXT, last_checked TEXT, feishu_img_key TEXT DEFAULT \"\")')
          conn.execute('CREATE TABLE IF NOT EXISTS change_log (id INTEGER PRIMARY KEY AUTOINCREMENT, product_id INTEGER, change_type TEXT, old_value TEXT, new_value TEXT, detected_at TEXT, notified INTEGER DEFAULT 0)')
          conn.execute('CREATE TABLE IF NOT EXISTS soldout_snapshot (id INTEGER PRIMARY KEY CHECK (id = 1), soldout_ids TEXT DEFAULT \"[]\", updated_at TEXT DEFAULT \"\")')
          conn.execute('INSERT OR IGNORE INTO soldout_snapshot (id, soldout_ids, updated_at) VALUES (1, \"[]\", \"\")')
          conn.commit()
          conn.close()
          "
          # 重新运行监控(建立新基线)
          python monitor_loop.py --once --silent
          echo "Self-heal complete"

      - name: Checkpoint DB (flush WAL to file)
        if: always()
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/products.db')
          conn.execute('PRAGMA wal_checkpoint(TRUNCATE)')
          conn.close()
          "

      - name: Save DB to cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/products.db
          key: jumpshop-db-v2-${{ github.run_id }}
